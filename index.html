<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S3T3 L1NH4S · CÉREBRO V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{--gold:#c8960c;--gold-light:#f0c040;--gold-dim:rgba(200,150,12,.32);--gold-glow:rgba(200,150,12,.22);--bg:#060501;--card-bg:rgba(8,6,1,.97);--white:rgba(255,255,255,.88);--white-dim:rgba(255,255,255,.4)}
        html,body{background:var(--bg);color:#fff;font-family:'Rajdhani',sans-serif;height:100%;width:100%;overflow:hidden;touch-action:manipulation}
        #canvas{position:fixed;inset:0;pointer-events:none;z-index:0}
        .screen{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;transition:opacity .6s ease,transform .6s ease}
        .screen.hidden{opacity:0;pointer-events:none;transform:scale(1.04)}
        .screen.gone{display:none}

        /* LOGIN */
        #loginScreen{flex-direction:column;background:var(--bg)}
        .login-card{width:100%;max-width:480px;padding:40px;border:1px solid var(--gold-dim);border-radius:16px;background:rgba(8,6,1,.95);box-shadow:0 0 40px rgba(200,150,12,.15)}
        .login-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:32px}
        .login-ring{width:100px;height:100px;border-radius:50%;border:2px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;animation:pulse 2.8s ease-in-out infinite;margin-bottom:16px}
        @keyframes pulse{0%,100%{box-shadow:0 0 20px var(--gold-glow)}50%{box-shadow:0 0 45px rgba(200,150,12,.55)}}
        .login-7{font-family:'Cinzel',serif;font-size:50px;font-weight:700;color:var(--gold-light);text-shadow:0 0 20px var(--gold-glow)}
        .login-title{font-family:'Cinzel',serif;font-size:20px;font-weight:700;letter-spacing:6px;color:#fff;margin-bottom:4px}
        .login-sub{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;color:var(--gold);margin-bottom:24px}
        .login-form{display:flex;flex-direction:column;gap:12px}
        .login-input{background:rgba(15,11,2,.8);border:1px solid rgba(200,150,12,.18);border-radius:8px;padding:12px 14px;font-size:13px;color:#fff;font-family:'Rajdhani',sans-serif;outline:none;transition:border-color .2s}
        .login-input:focus{border-color:rgba(200,150,12,.55)}
        .login-input::placeholder{color:rgba(255,255,255,.2)}
        .login-btn{background:var(--gold);color:#050505;border:none;border-radius:8px;padding:12px;font-family:'Cinzel',serif;font-size:12px;font-weight:600;letter-spacing:2px;cursor:pointer;transition:all .2s}
        .login-btn:hover{background:var(--gold-light);transform:scale(1.02)}
        .login-btn:active{transform:scale(.98)}

        /* BOOT */
        #bootScreen{flex-direction:column}
        .boot-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:24px}
        .boot-ring{width:110px;height:110px;border-radius:50%;border:2px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;animation:pulse 2.8s ease-in-out infinite}
        .boot-7{font-family:'Cinzel',serif;font-size:55px;font-weight:700;color:var(--gold-light);text-shadow:0 0 25px var(--gold-glow)}
        .boot-title{font-family:'Cinzel',serif;font-size:22px;font-weight:700;letter-spacing:8px;color:#fff;margin-bottom:2px}
        .boot-sub{font-family:'Cinzel',serif;font-size:9px;letter-spacing:6px;color:var(--gold);margin-bottom:28px}
        .boot-bar-wrap{width:200px;height:2px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
        .boot-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--gold-light));transition:width 2.4s cubic-bezier(.4,0,.2,1)}
        .boot-msg{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.26);margin-top:12px;min-height:14px;text-align:center}

        /* ORBIT */
        #orbitScreen{flex-direction:column;overflow:hidden}
        .orbit-container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
        .orbit-svg{position:absolute;width:100%;height:100%;top:0;left:0;pointer-events:none;z-index:2}
        .orbit-center{position:absolute;width:180px;height:180px;border-radius:50%;border:3px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;animation:pulse 3s ease-in-out infinite;z-index:5;transition:all .3s}
        .orbit-center:hover{border-color:var(--gold-light);box-shadow:0 0 40px rgba(200,150,12,.4)}
        .center-7{font-family:'Cinzel',serif;font-size:70px;font-weight:700;color:var(--gold-light);text-shadow:0 0 25px var(--gold-glow)}
        .center-label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:var(--gold);margin-top:6px}
        .planets-wrapper{position:absolute;width:100%;height:100%;top:0;left:0}
        .planet-card{position:absolute;width:130px;height:130px;border-radius:10px;border:2px solid;background:rgba(8,6,1,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:10px;text-align:center;overflow:hidden;z-index:3;transition:all .3s}
        .planet-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:.8}
        .planet-card:hover{transform:scale(1.1);box-shadow:0 0 40px currentColor}
        .planet-icon{font-size:28px;margin-bottom:4px;z-index:1}
        .planet-name{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;font-weight:600;z-index:1}
        .planet-desc{font-size:7.5px;margin-top:3px;line-height:1.2;color:rgba(255,255,255,.4);z-index:1}
        .planet-1{--color:#c8960c;border-color:#c8960c}.planet-1 .planet-name{color:#f0c040}.planet-1::before{background:#c8960c}
        .planet-2{--color:#ef4444;border-color:#ef4444}.planet-2 .planet-name{color:#f87171}.planet-2::before{background:#ef4444}
        .planet-3{--color:#06b6d4;border-color:#06b6d4}.planet-3 .planet-name{color:#67e8f9}.planet-3::before{background:#06b6d4}
        .planet-4{--color:#a855f7;border-color:#a855f7}.planet-4 .planet-name{color:#d8b4fe}.planet-4::before{background:#a855f7}
        .planet-5{--color:#22c55e;border-color:#22c55e}.planet-5 .planet-name{color:#86efac}.planet-5::before{background:#22c55e}
        .planet-6{--color:#f97316;border-color:#f97316}.planet-6 .planet-name{color:#fdba74}.planet-6::before{background:#f97316}
        .planet-7{--color:#e5e5e5;border-color:#e5e5e5}.planet-7 .planet-name{color:#f5f5f5}.planet-7::before{background:#e5e5e5}

        /* MODAL */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.84);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(7px)}
        .modal-overlay.open{opacity:1;pointer-events:all}
        .modal-sheet{width:100%;max-width:600px;height:88vh;background:rgba(5,4,0,.99);border:1px solid var(--gold-dim);border-radius:22px 22px 0 0;display:flex;flex-direction:column;box-shadow:0 -20px 70px rgba(200,150,12,.12);transform:translateY(100%);transition:transform .38s cubic-bezier(.32,0,.67,0)}
        .modal-overlay.open .modal-sheet{transform:translateY(0);transition:transform .38s cubic-bezier(.33,1,.68,1)}
        .modal-handle{width:32px;height:2px;background:rgba(200,150,12,.28);border-radius:2px;margin:10px auto 0;cursor:pointer}
        .modal-close-btn{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.45);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .modal-close-btn:active{border-color:var(--gold-dim);color:var(--gold)}
        .modal-header{padding:10px 16px;border-bottom:1px solid rgba(200,150,12,.08);display:flex;align-items:center;gap:8px;padding-right:48px}
        .modal-ctx-dot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 8px currentColor}
        .modal-ctx-name{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--gold-light)}
        .chat-panel{display:flex;flex-direction:column;flex:1;min-height:0}
        .chat-messages{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--gold-dim) transparent}
        .chat-messages::-webkit-scrollbar{width:3px}
        .chat-messages::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}
        .msg-row{display:flex;flex-direction:column;gap:2px}
        .msg-row.user{align-items:flex-end}
        .msg-row.bot{align-items:flex-start}
        .msg-bubble{padding:9px 12px;border-radius:12px;font-size:12px;line-height:1.6;max-width:90%;letter-spacing:.1px}
        .msg-row.user .msg-bubble{background:linear-gradient(135deg,#6b4700,#c8960c);color:#fff;border-radius:12px 12px 2px 12px}
        .msg-row.bot .msg-bubble{background:rgba(15,11,2,.95);border:1px solid rgba(200,150,12,.15);color:rgba(255,255,255,.86);border-radius:12px 12px 12px 2px}
        .msg-time{font-size:8px;color:rgba(255,255,255,.2);letter-spacing:.5px;padding:0 3px}
        .typing-wrap{display:flex;gap:4px;padding:9px 12px;background:rgba(15,11,2,.95);border:1px solid rgba(200,150,12,.13);border-radius:12px 12px 12px 2px;width:fit-content}
        .td{width:5px;height:5px;background:var(--gold);border-radius:50%;animation:td 1.2s infinite}
        .td:nth-child(2){animation-delay:.2s}
        .td:nth-child(3){animation-delay:.4s}
        @keyframes td{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-4px);opacity:1}}
        .chat-input-area{padding:10px 12px;border-top:1px solid rgba(200,150,12,.08);display:flex;gap:6px;align-items:flex-end}
        .chat-input{flex:1;background:rgba(15,11,2,.8);border:1px solid rgba(200,150,12,.18);border-radius:8px;padding:9px 11px;font-size:12px;color:#fff;font-family:'Rajdhani',sans-serif;resize:none;min-height:36px;max-height:90px;outline:none;transition:border-color .2s}
        .chat-input:focus{border-color:rgba(200,150,12,.55)}
        .chat-input::placeholder{color:rgba(255,255,255,.2)}
        .send-btn{width:38px;height:38px;border-radius:8px;border:none;background:var(--gold);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0}
        .send-btn:active{background:var(--gold-light);transform:scale(.95)}
        .send-icon{width:16px;height:16px;fill:#050505}

        /* RESPONSIVO */
        @media(max-width:768px){
            .planet-card{width:110px;height:110px}
            .orbit-center{width:140px;height:140px}
            .center-7{font-size:50px}
            .login-card{max-width:90%;padding:30px}
        }
        @media(max-width:480px){
            .planet-card{width:90px;height:90px}
            .planet-icon{font-size:22px}
            .planet-name{font-size:8px}
            .planet-desc{font-size:6.5px}
            .orbit-center{width:110px;height:110px}
            .center-7{font-size:40px}
            .login-card{max-width:95%;padding:24px}
            .login-ring{width:80px;height:80px}
            .login-7{font-size:40px}
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- LOGIN -->
    <div class="screen" id="loginScreen">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-ring">
                    <span class="login-7">7</span>
                </div>
                <div class="login-title">S3T3 L1NH4S</div>
                <div class="login-sub">CÉREBRO · ACESSO</div>
            </div>
            <div class="login-form">
                <input type="text" class="login-input" id="loginName" placeholder="Nome da Empresa">
                <input type="email" class="login-input" id="loginEmail" placeholder="Email">
                <input type="password" class="login-input" id="loginPassword" placeholder="Senha" onkeydown="if(event.key==='Enter')handleLogin()">
                <button type="button" class="login-btn" onclick="handleLogin()">ENTRAR NO SISTEMA</button>
            </div>
        </div>
    </div>

    <!-- BOOT -->
    <div class="screen hidden gone" id="bootScreen">
        <div class="boot-logo">
            <div class="boot-ring">
                <span class="boot-7">7</span>
            </div>
        </div>
        <div class="boot-title">S3T3 L1NH4S</div>
        <div class="boot-sub">CÉREBRO · V3 ORBIT</div>
        <div class="boot-bar-wrap"><div class="boot-bar" id="bootBar"></div></div>
        <div class="boot-msg" id="bootMsg">INICIALIZANDO...</div>
    </div>

    <!-- ORBIT -->
    <div class="screen hidden gone" id="orbitScreen">
        <div class="orbit-container">
            <svg class="orbit-svg" id="orbitSvg"></svg>
            <div class="orbit-center" onclick="openChat('geral','CÉREBRO DIGITAL','#c8960c')">
                <span class="center-7">7</span>
                <span class="center-label">CÉREBRO</span>
            </div>
            <div class="planets-wrapper" id="planetsWrapper"></div>
        </div>
    </div>

    <!-- CHAT MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeOut(event)">
        <div class="modal-sheet" id="modalSheet">
            <div class="modal-handle" onclick="closeModal()"></div>
            <button class="modal-close-btn" onclick="closeModal()">✕</button>
            <div class="modal-header">
                <div class="modal-ctx-dot" id="ctxDot"></div>
                <span class="modal-ctx-name" id="ctxName">CÉREBRO</span>
            </div>
            <div class="chat-panel">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <textarea class="chat-input" id="chatInput" placeholder="Digite..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                    <button class="send-btn" onclick="sendMsg()">
                        <svg class="send-icon" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="#050505" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CANVAS - Partículas
        const cv=document.getElementById('canvas'),cx=cv.getContext('2d');
        let W,H,stars=[],dust=[];
        const rsz=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;drawOrbit()};
        rsz();
        addEventListener('resize',rsz);
        for(let i=0;i<200;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*.85+.12,o:Math.random()*.6+.12,tw:Math.random()*4+1.5});
        for(let i=0;i<50;i++)dust.push({x:Math.random(),y:Math.random(),r:Math.random()*1.2+.3,vx:(Math.random()-.5)*.00025,vy:(Math.random()-.5)*.00025,o:Math.random()*.18+.04});
        let t=0;
        (function drawBg(){
            cx.clearRect(0,0,W,H);
            const g=cx.createRadialGradient(W/2,H*.38,0,W/2,H*.38,Math.max(W,H)*.7);
            g.addColorStop(0,'rgba(90,60,0,.12)');
            g.addColorStop(1,'rgba(0,0,0,0)');
            cx.fillStyle=g;cx.fillRect(0,0,W,H);
            stars.forEach(s=>{const fl=.35+.65*Math.sin(t/s.tw+s.x*9);cx.beginPath();cx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);cx.fillStyle=`rgba(255,220,100,${s.o*fl})`;cx.fill()});
            dust.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=1;if(p.x>1)p.x=0;if(p.y<0)p.y=1;if(p.y>1)p.y=0;cx.beginPath();cx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);cx.fillStyle=`rgba(200,150,12,${p.o})`;cx.fill()});
            t+=.035;
            requestAnimationFrame(drawBg);
        })();

        // ÓRBITA
        function drawOrbit(){
            const svg=document.getElementById('orbitSvg');
            if(!svg)return;
            svg.innerHTML='';
            svg.setAttribute('width',W);
            svg.setAttribute('height',H);
            const centerX=W/2,centerY=H/2,radius=Math.min(W,H)*.25;
            const ring1=document.createElementNS('http://www.w3.org/2000/svg','circle');
            ring1.setAttribute('cx',centerX);ring1.setAttribute('cy',centerY);ring1.setAttribute('r',radius);ring1.setAttribute('fill','none');ring1.setAttribute('stroke','rgba(200,150,12,.15)');ring1.setAttribute('stroke-width','1');ring1.setAttribute('stroke-dasharray','5,5');
            svg.appendChild(ring1);
            const ring2=document.createElementNS('http://www.w3.org/2000/svg','circle');
            ring2.setAttribute('cx',centerX);ring2.setAttribute('cy',centerY);ring2.setAttribute('r',radius*1.4);ring2.setAttribute('fill','none');ring2.setAttribute('stroke','rgba(200,150,12,.08)');ring2.setAttribute('stroke-width','1');ring2.setAttribute('stroke-dasharray','8,4');
            svg.appendChild(ring2);
            for(let i=0;i<7;i++){
                const angle=(i*360/7)*Math.PI/180;
                const x=centerX+radius*Math.cos(angle);
                const y=centerY+radius*Math.sin(angle);
                const line=document.createElementNS('http://www.w3.org/2000/svg','line');
                line.setAttribute('x1',centerX);line.setAttribute('y1',centerY);line.setAttribute('x2',x);line.setAttribute('y2',y);line.setAttribute('stroke','rgba(200,150,12,.25)');line.setAttribute('stroke-width','1');
                svg.appendChild(line);
            }
        }

        // PLANETAS
        function positionPlanets(){
            const wrapper=document.getElementById('planetsWrapper');
            wrapper.innerHTML='';
            const centerX=W/2,centerY=H/2,radius=Math.min(W,H)*.25;
            const planets=[
                {name:'REDES SOCIAIS',icon:'📱',desc:'Estratégia digital',ctx:'social',color:'#c8960c',class:'planet-1'},
                {name:'TRÁFEGO PAGO',icon:'🎯',desc:'Campanhas e leads',ctx:'trafego',color:'#ef4444',class:'planet-2'},
                {name:'DEV WEB',icon:'🌐',desc:'Sites e apps',ctx:'web',color:'#06b6d4',class:'planet-3'},
                {name:'AUTOMAÇÃO / IA',icon:'🤖',desc:'Processos inteligentes',ctx:'ia',color:'#a855f7',class:'planet-4'},
                {name:'SISTEMAS',icon:'📊',desc:'Dashboards e dados',ctx:'sistemas',color:'#22c55e',class:'planet-5'},
                {name:'BRANDING',icon:'🎨',desc:'Identidade visual',ctx:'branding',color:'#f97316',class:'planet-6'},
                {name:'AUDIOVISUAL',icon:'🎥',desc:'Produção de conteúdo',ctx:'av',color:'#e5e5e5',class:'planet-7'}
            ];
            planets.forEach((p,i)=>{
                const angle=(i*360/7)*Math.PI/180;
                const x=centerX+radius*Math.cos(angle);
                const y=centerY+radius*Math.sin(angle);
                const card=document.createElement('div');
                card.className=`planet-card ${p.class}`;
                card.style.left=(x-65)+'px';
                card.style.top=(y-65)+'px';
                card.onclick=()=>openChat(p.ctx,p.name,p.color);
                card.innerHTML=`<div class="planet-icon">${p.icon}</div><div class="planet-name">${p.name}</div><div class="planet-desc">${p.desc}</div>`;
                wrapper.appendChild(card);
            });
        }

        // LOGIN
        function handleLogin(){
            const name=document.getElementById('loginName').value;
            const email=document.getElementById('loginEmail').value;
            const pass=document.getElementById('loginPassword').value;
            if(!name||!email||!pass){alert('Preencha todos os campos.');return;}
            localStorage.setItem('user',JSON.stringify({name,email,timestamp:Date.now()}));
            showBoot();
        }

        // BOOT
        function showBoot(){
            document.getElementById('loginScreen').classList.add('hidden');
            setTimeout(()=>{
                document.getElementById('loginScreen').classList.add('gone');
                const b=document.getElementById('bootScreen');
                b.classList.remove('gone');
                setTimeout(()=>b.classList.remove('hidden'),40);
            },650);

            const msgs=['CARREGANDO ÓRBITA...','INICIALIZANDO IA...','ATIVANDO CÉREBRO...','PRONTO ✓'];
            const bar=document.getElementById('bootBar');
            const msgEl=document.getElementById('bootMsg');
            setTimeout(()=>(bar.style.width='100%'),80);
            msgs.forEach((m,i)=>setTimeout(()=>(msgEl.textContent=m),i*580));
            setTimeout(()=>{
                const boot = document.getElementById('bootScreen');
                boot.classList.add('hidden');
                setTimeout(()=>{
                    boot.classList.add('gone');
                    const d=document.getElementById('orbitScreen');
                    d.classList.remove('gone');
                    positionPlanets();
                    setTimeout(()=>d.classList.remove('hidden'),40);
                },650);
            },2800);
        }

        // CHAT
        let history=[];
        function openChat(ctx,name,color){
            document.getElementById('ctxDot').style.background=color;
            document.getElementById('ctxName').textContent=name;
            document.getElementById('modalOverlay').classList.add('open');
            document.body.style.overflow='hidden';
            history=[];
            document.getElementById('chatMessages').innerHTML='';
            botBubble(`Olá! Sou o Cérebro da Sete Linhas. Como posso ajudar com ${name}?`);
        }
        function closeModal(){
            document.getElementById('modalOverlay').classList.remove('open');
            document.body.style.overflow='';
        }
        function closeOut(e){if(e.target===document.getElementById('modalOverlay'))closeModal()}
        function bubble(role,text){
            const area=document.getElementById('chatMessages');
            const t=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
            const d=document.createElement('div');
            d.className='msg-row '+role;
            d.innerHTML=`<div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div><div class="msg-time">${t}</div>`;
            area.appendChild(d);
            area.scrollTop=area.scrollHeight;
        }
        function botBubble(t){bubble('bot',t)}
        function showTyping(){
            const area=document.getElementById('chatMessages');
            const d=document.createElement('div');
            d.className='msg-row bot';d.id='tyRow';
            d.innerHTML=`<div class="typing-wrap"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
            area.appendChild(d);area.scrollTop=area.scrollHeight;
        }
        function hideTyping(){const e=document.getElementById('tyRow');if(e)e.remove()}
        function sendMsg(){
            const inp=document.getElementById('chatInput');
            const text=inp.value.trim();
            if(!text)return;
            inp.value='';inp.style.height='auto';
            bubble('user',text);
            history.push({role:'user',content:text});
            showTyping();
            setTimeout(()=>{
                hideTyping();
                const responses=['Entendi sua necessidade. Deixe-me analisar as melhores opções.','Ótima pergunta! Vou estruturar uma resposta estratégica.','Perfeito! Vou processar isso e trazer as melhores soluções.'];
                const response=responses[Math.floor(Math.random()*responses.length)];
                botBubble(response);
                history.push({role:'assistant',content:response});
            },1500);
        }
        function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}}
        function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px'}
        let ty0=0;
        document.getElementById('modalSheet').addEventListener('touchstart',e=>{ty0=e.touches[0].clientY},{passive:true});
        document.getElementById('modalSheet').addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-ty0>80)closeModal()},{passive:true});
        document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
    </script>
</body>
</html>
