<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S3T3 L1NH4S Login</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:'Rajdhani',sans-serif;
color:white;
padding:20px;
}

.login-container{
width:100%;
max-width:520px;
background:rgba(10,10,10,.95);
border:1px solid rgba(212,175,55,.3);
border-radius:28px;
padding:40px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,.8);
}

.login-logo-img{
width:100%;
max-width:430px;
margin:auto;
display:block;
margin-bottom:20px;
filter:drop-shadow(0 0 14px rgba(212,175,55,.4));
}

.login-subtitle{
letter-spacing:5px;
font-size:11px;
color:rgba(255,255,255,.6);
margin-bottom:30px;
}

.login-form{
display:flex;
flex-direction:column;
gap:16px;
}

.form-input{
width:100%;
padding:15px;
border-radius:14px;
border:1px solid rgba(212,175,55,.25);
background:rgba(255,255,255,.03);
color:white;
font-size:16px;
outline:none;
}

.form-input::placeholder{
color:rgba(255,255,255,.45);
}

.login-btn{
padding:16px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#8a6508,#d4af37);
font-family:'Cinzel',serif;
font-weight:900;
font-size:15px;
cursor:pointer;
margin-top:10px;
}

.login-btn:hover{
transform:scale(1.02);
transition:.2s;
}
</style>
</head>
